<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานผลกองทุนพัฒนาบทบาทสตรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .container-box { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; margin: 0 !important; max-width: none !important; }
            .table-wrapper { overflow: visible !important; max-height: none !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 0.5pt solid #666 !important; padding: 4pt !important; font-size: 8pt !important; color: black !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 6px; border: 2px solid #fdfdfd; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "xlsx": "https://esm.sh/xlsx@0.18.5"
      }
    }
    </script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import * as XLSX from 'xlsx';

        const API_URL = 'https://script.google.com/macros/s/AKfycbxIDBqQkRdzRZsFsqTrxcdCg0FXY-NoxZ8UaFFKNG9oOGWr3G67vYmjw4vEpXoKLbH1_Q/exec';
        const LOGO_CDD = 'https://i.postimg.cc/507bjy9Z/cdd.png';
        const LOGO_WOMEN = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZtkPBp_xmIFgEEmX2cyScE1QzabzZbtNdbQ&s';
        const ICON_HOME = 'https://cdn-icons-png.flaticon.com/512/25/25694.png';

        const START_BODY_ROW = 5;
        const DISPLAY_COLS = [0, 1, 2, 7, 12, 17, 18, 19, 20];

        const THEMES = {
            'ไตรมาส 1-2': { main: '#f8bbd0', dark: '#880e4f', gradient: 'linear-gradient(to bottom right, #ffe6f0, #ffd1e6)', border: '#f48fb1' },
            'ไตรมาส 3-4': { main: '#e1bee7', dark: '#6a1b9a', gradient: 'linear-gradient(to bottom right, #f3e5f5, #e1bee7)', border: '#ce93d8' }
        };

        const App = () => {
            const [currentQuarter, setCurrentQuarter] = useState('ไตรมาส 1-2');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [isExportOpen, setIsExportOpen] = useState(false);
            const exportRef = useRef(null);

            const theme = THEMES[currentQuarter];

            const fetchData = useCallback(async (quarter) => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}?sheetName=${encodeURIComponent(quarter)}`);
                    const resJson = await response.json();
                    
                    let headerPart = resJson.data.slice(0, START_BODY_ROW);
                    let bodyPart = resJson.data.slice(START_BODY_ROW);

                    // 1. กรองแถวที่ไม่ต้องการ (หมายเหตุท้ายตาราง)
                    bodyPart = bodyPart.filter(row => {
                        const val = String(row[1] || row[0] || "");
                        return val && !val.includes("1) กรณีจังหวัด") && !val.includes("2) เป้าหมายหนี้");
                    });

                    // 2. สลับคอลัมน์ (ยกเว้นแถวรวม)
                    bodyPart = bodyPart.map(row => {
                        const newRow = [...row];
                        if (newRow[0] !== "รวม") {
                            [newRow[1], newRow[2]] = [newRow[2], newRow[1]];
                        }
                        return newRow;
                    });

                    // 3. เรียงตามเขต และแยกแถวรวม
                    const normalRows = bodyPart.filter(r => r[0] !== "รวม").sort((a, b) => (parseInt(a[1]) || 0) - (parseInt(b[1]) || 0));
                    const summaryRows = bodyPart.filter(r => r[0] === "รวม");

                    setData([...headerPart, ...normalRows, ...summaryRows]);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            }, []);

            useEffect(() => {
                fetchData(currentQuarter);
                const clickOutside = (e) => { if (exportRef.current && !exportRef.current.contains(e.target)) setIsExportOpen(false); };
                window.addEventListener('mousedown', clickOutside);
                return () => window.removeEventListener('mousedown', clickOutside);
            }, [currentQuarter, fetchData]);

            const filteredRows = useMemo(() => {
                const body = data.slice(START_BODY_ROW);
                if (!searchQuery.trim()) return body;
                const q = searchQuery.toLowerCase();
                return body.filter(r => r.some(c => String(c).toLowerCase().includes(q)));
            }, [data, searchQuery]);

            const exportExcel = () => {
                const exportData = [
                    ["ลำดับ", "เขตตรวจราชการ", "จังหวัด", "ร้อยละการใช้จ่าย(A)", "ร้อยละการรับชำระคืน(B)", "ร้อยละหนี้เกินกำหนด(C)", "คะแนนรวม", "ระดับ", "หมายเหตุ"],
                    ...filteredRows.map(row => {
                        if(row[0] === "รวม") return ["รวมทั้งสิ้น", "", "", row[7], row[12], row[17], row[18], row[19], row[20]];
                        return DISPLAY_COLS.map(idx => row[idx]);
                    })
                ];
                const ws = XLSX.utils.aoa_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Report");
                XLSX.writeFile(wb, `รายงาน_${currentQuarter}.xlsx`);
                setIsExportOpen(false);
            };

            const formatValue = (val, colIdx) => {
                if (!val && val !== 0) return '';
                if ([7, 12, 17, 18].includes(colIdx)) {
                    const num = parseFloat(String(val).replace(/,/g, ''));
                    return isNaN(num) ? val : num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }
                return val;
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex justify-center transition-all duration-700" style={{ background: theme.gradient }}>
                    <div className="w-full max-w-[1700px] bg-white rounded-[35px] p-6 md:p-10 shadow-2xl relative flex flex-col container-box border border-white/60">
                        
                        {/* Logos */}
                        <div className="absolute top-6 right-8 flex items-center gap-4 z-10 no-print">
                            <img src={LOGO_CDD} alt="CDD" className="h-10 md:h-16 object-contain" />
                            <img src={LOGO_WOMEN} alt="Women Fund" className="h-10 md:h-16 object-contain" />
                        </div>

                        {/* Header Title */}
                        <div className="mt-10 mb-8 text-center px-4">
                            <h1 className="text-lg md:text-xl font-bold leading-relaxed" style={{ color: theme.dark }}>
                                {data[0]?.[0]} <br/> {data[1]?.[0]}
                            </h1>
                        </div>

                        {/* Toolbar - ชุดเดิมที่หายไป */}
                        <div className="flex flex-wrap items-center justify-between gap-4 bg-gray-50/80 p-4 rounded-[25px] border border-gray-100 shadow-sm w-full no-print mb-8">
                            {/* ปุ่มกลับเมนูหลัก */}
                            <button onClick={() => window.location.href='Menu.html'} className="flex items-center gap-2 px-6 py-2.5 rounded-2xl font-bold transition-all hover:shadow-md hover:-translate-y-0.5 active:scale-95 text-sm md:text-base border-2" style={{ backgroundColor: theme.main, color: theme.dark, borderColor: theme.dark }}>
                                <img src={ICON_HOME} alt="home" className="h-5" /> กลับสู่เมนูหลัก
                            </button>

                            <div className="flex flex-wrap items-center gap-4 flex-1 justify-end">
                                {/* เลือกไตรมาส */}
                                <div className="flex items-center gap-2">
                                    <span className="text-sm font-bold text-gray-700">ไตรมาส:</span>
                                    <select value={currentQuarter} onChange={(e) => setCurrentQuarter(e.target.value)} className="px-3 py-2 rounded-xl border bg-white focus:ring-4 focus:ring-pink-100 outline-none text-sm font-bold cursor-pointer" style={{ borderColor: theme.border }}>
                                        <option value="ไตรมาส 1-2">ไตรมาส 1-2</option>
                                        <option value="ไตรมาส 3-4">ไตรมาส 3-4</option>
                                    </select>
                                </div>

                                {/* ค้นหาข้อมูล */}
                                <div className="flex items-center gap-3 border-l-2 pl-4 border-gray-200 flex-1 max-w-md min-w-[200px]">
                                    <span className="text-lg">🔍</span>
                                    <input type="text" placeholder="ค้นหาจังหวัด/เขต..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="px-4 py-2 rounded-xl border bg-white focus:ring-4 focus:ring-pink-100 outline-none text-sm w-full" style={{ borderColor: theme.border }} />
                                </div>

                                {/* ส่งออกข้อมูล */}
                                <div className="relative border-l-2 pl-4 border-gray-200" ref={exportRef}>
                                    <button onClick={() => setIsExportOpen(!isExportOpen)} className="flex items-center gap-2 px-5 py-2 rounded-xl font-bold border-2 transition-all hover:brightness-95 active:scale-95 text-sm whitespace-nowrap" style={{ backgroundColor: theme.main, color: theme.dark, borderColor: theme.dark }}>
                                        📥 ส่งออกข้อมูล ▾
                                    </button>
                                    {isExportOpen && (
                                        <div className="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-2xl z-[200] overflow-hidden">
                                            <button onClick={exportExcel} className="w-full text-left px-4 py-3 text-sm font-bold hover:bg-green-50 text-green-700 border-b flex items-center gap-2">📊 ไฟล์ Excel (.xlsx)</button>
                                            <button onClick={() => { setIsExportOpen(false); window.print(); }} className="w-full text-left px-4 py-3 text-sm font-bold hover:bg-red-50 text-red-700 flex items-center gap-2">📄 ไฟล์ PDF (Print)</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="flex-1 overflow-auto rounded-2xl border border-gray-200 bg-white shadow-inner table-wrapper custom-scrollbar">
                            <table className="w-full border-collapse">
                                <thead className="sticky top-0 z-50">
                                    <tr style={{ backgroundColor: theme.main, color: theme.dark }}>
                                        <th rowSpan="2" className="border p-2 text-sm font-bold">ลำดับ</th>
                                        <th rowSpan="2" className="border p-2 text-sm font-bold">เขตตรวจราชการ</th>
                                        <th rowSpan="2" className="border p-2 text-sm font-bold">จังหวัด</th>
                                        <th className="border p-2 text-sm font-bold">ร้อยละการใช้จ่าย (A)</th>
                                        <th className="border p-2 text-sm font-bold">ร้อยละการรับชำระคืน (B)</th>
                                        <th className="border p-2 text-sm font-bold">ร้อยละหนี้เกินกำหนด (C)</th>
                                        <th colSpan="2" className="border p-2 text-sm font-bold">ระดับความสำเร็จฯ (D)</th>
                                        <th rowSpan="2" className="border p-2 text-sm font-bold">หมายเหตุ</th>
                                    </tr>
                                    <tr style={{ backgroundColor: theme.main, color: theme.dark }}>
                                        <th className="border p-1 text-xs">คะแนน</th>
                                        <th className="border p-1 text-xs">คะแนน</th>
                                        <th className="border p-1 text-xs">คะแนน</th>
                                        <th className="border p-1 text-xs">คะแนนรวม</th>
                                        <th className="border p-1 text-xs">ระดับ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {loading ? (
                                        <tr><td colSpan="9" className="p-20 text-center italic text-pink-500 font-bold animate-pulse">กำลังโหลดข้อมูล...</td></tr>
                                    ) : (
                                        filteredRows.map((row, rIdx) => {
                                            const isSummary = row[0] === "รวม";
                                            return (
                                                <tr key={rIdx} className={`${isSummary ? 'bg-gray-100 font-bold' : 'hover:bg-pink-50 transition-colors'}`}>
                                                    {isSummary ? (
                                                        <>
                                                            <td colSpan="3" className="border p-3 text-center bg-gray-200">รวมทั้งสิ้น</td>
                                                            {[7, 12, 17, 18, 19, 20].map(idx => (
                                                                <td key={idx} className="border p-2 text-center">{formatValue(row[idx], idx)}</td>
                                                            ))}
                                                        </>
                                                    ) : (
                                                        DISPLAY_COLS.map((colIdx, cIdx) => (
                                                            <td key={colIdx} className={`border p-2 text-sm ${cIdx >= 3 ? 'text-center' : ''}`}>
                                                                {formatValue(row[colIdx], colIdx)}
                                                            </td>
                                                        ))
                                                    )}
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
